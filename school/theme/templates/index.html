<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Create Post</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex justify-center items-center min-h-screen">

<div class="bg-white shadow-lg rounded-xl w-full max-w-md p-6">

<h2 class="text-2xl font-bold text-center mb-6">Create Post</h2>

<form method="POST" enctype="multipart/form-data" class="space-y-4">

<!-- Title -->
<div>
<label class="block text-sm font-semibold mb-1">Title</label>
<input type="text" name="title"
class="w-full border rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
</div>

<!-- Author -->
<div>
<label class="block text-sm font-semibold mb-1">Author</label>
<input type="text" name="author"
class="w-full border rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
</div>

<!-- Image -->
<div>
<label class="block text-sm font-semibold mb-1">Upload Image</label>
<input type="file" name="image"
class="w-full border rounded-lg p-2 bg-white">
</div>

<!-- Description -->
<div>
<label class="block text-sm font-semibold mb-1">Description</label>
<textarea name="description" rows="4"
class="w-full border rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-blue-400"
placeholder="Write a description"></textarea>
</div>

<!-- Post Button -->
<button type="submit"
class="w-full bg-blue-500 text-white py-2 rounded-lg hover:bg-blue-600 transition">
Post
</button>

</form>

</div>

</body>
</html>
